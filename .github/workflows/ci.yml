name: CI

on:
  push:
  pull_request:

jobs:
  lint-build-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync backend/frontend
        run: uv sync --frozen

      - name: Lint backend/frontend
        run: uv run ruff check .

      - name: Test backend/frontend
        run: |
          test_dirs=()
          for dir in packages/backend/tests packages/frontend/tests tests; do
            if [ -d "$dir" ]; then
              test_dirs+=("$dir")
            fi
          done

          if [ "${#test_dirs[@]}" -eq 0 ]; then
            echo "No backend/frontend test directories found"
            exit 0
          fi

          if ! find "${test_dirs[@]}" -type f \( -name "test_*.py" -o -name "*_test.py" \) | grep -q .; then
            echo "No backend/frontend tests found"
            exit 0
          fi

          uv run pytest "${test_dirs[@]}"

      - name: Sync ML
        run: cd packages/ml && uv sync --frozen

      - name: Lint ML
        run: cd packages/ml && uv run ruff check .

      - name: Test ML
        run: |
          if [ ! -d packages/ml/tests ]; then
            echo "No ML test directory found"
            exit 0
          fi

          if ! find packages/ml/tests -type f \( -name "test_*.py" -o -name "*_test.py" \) | grep -q .; then
            echo "No ML tests found"
            exit 0
          fi

          cd packages/ml
          uv run pytest tests

      - name: Build containers
        run: docker compose -f docker-compose.yml -f infra/compose/docker-compose.ci.yml build

      - name: Start services
        run: docker compose -f docker-compose.yml -f infra/compose/docker-compose.ci.yml up -d

      - name: Smoke test
        run: |
          sleep 15
          bash scripts/smoke_test.sh

      - name: Show logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml -f infra/compose/docker-compose.ci.yml logs

      - name: Stop services
        if: always()
        run: docker compose -f docker-compose.yml -f infra/compose/docker-compose.ci.yml down -v
