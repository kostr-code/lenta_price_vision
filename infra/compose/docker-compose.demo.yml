services:
  backend:
    environment:
      APP_ENV: demo
      LOG_LEVEL: INFO
      AUTO_CREATE_TABLES: "1"
      DEMO_MODE: "1"
      ML_URL: ${ML_URL:-http://host.docker.internal:8000}
      MODEL_PATH: ${MODEL_PATH:-/app/models/price_tag_detector.pt}
    volumes:
      - ./models:/app/models:ro
    restart: unless-stopped

  frontend:
    restart: unless-stopped
