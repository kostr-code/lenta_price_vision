services:
  postgres:
    ports: []
    tmpfs:
      - /var/lib/postgresql/data

  backend:
    environment:
      APP_ENV: ci
      LOG_LEVEL: WARNING
      AUTO_CREATE_TABLES: "1"
      DATABASE_URL: postgresql+psycopg://price_audit:price_audit@postgres:5432/price_audit
      ML_URL: http://ml:8000
      STORE_API_URL: http://mock-store-api:8002
    ports: []

  ml:
    environment:
      APP_ENV: ci
      LOG_LEVEL: WARNING
      ML_DEVICE: cpu
      ML_ENABLE_STUB: "1"
      MODEL_PATH: /app/models/price_tag_detector.pt
    ports: []

  mock-store-api:
    environment:
      APP_ENV: ci
      LOG_LEVEL: WARNING
    ports: []