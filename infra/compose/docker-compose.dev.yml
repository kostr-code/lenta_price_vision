services:
  backend:
    volumes:
      - ./packages/backend/src:/app/packages/backend/src
      - ./packages/backend/migrations:/app/packages/backend/migrations
      - ./data:/app/data
    environment:
      APP_ENV: dev
      LOG_LEVEL: DEBUG
      AUTO_CREATE_TABLES: "1"
      ML_URL: ${ML_URL:-http://host.docker.internal:8000}
    command:
      [
        "uv",
        "run",
        "uvicorn",
        "backend.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8001",
        "--reload"
      ]

  frontend:
    image: node:20-alpine
    container_name: price-audit-frontend-dev
    working_dir: /app/packages/frontend
    environment:
      VITE_BACKEND_URL: ${VITE_BACKEND_URL:-http://localhost:8001}
    volumes:
      - ./:/app
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      backend:
        condition: service_healthy
    command:
      [
        "sh",
        "-lc",
        "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
      ]
