[project]
name = "frontend"
version = "0.1.0"
description = "Desktop operator UI for retail price tag audit system"
requires-python = ">=3.11,<3.12"
dependencies = [

    "pyside6>=6.8.0",
    "requests>=2.32.0",
    "httpx>=0.27.2",

    "pydantic>=2.9.0",
    "pydantic-settings>=2.6.0",

    "pillow>=10.4.0",
    "opencv-python>=4.10.0",
]

[project.scripts]
frontend = "frontend.main:run"

[tool.uv.sources]
shared = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv]
package = true

[tool.hatch.build.targets.wheel]
packages = ["src/frontend"]