[project]
name = "mock-store-api"
version = "0.1.0"
description = "Mock store management API for retail price tag audit demo"
requires-python = ">=3.12"
dependencies = [
    
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.32.0",

    "pydantic>=2.9.0",
    "pydantic-settings>=2.6.0",

    "orjson>=3.10.7",
    "structlog>=24.4.0",
]

[project.scripts]
mock-store-api = "mock_store_api.main:run"

[tool.uv.sources]
shared = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv]
package = true

[tool.hatch.build.targets.wheel]
packages = ["src/mock_store_api"]