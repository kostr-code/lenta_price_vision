[project]
name = "backend"
version = "0.1.0"
description = "Backend API and business logic for retail price tag audit"
requires-python = ">=3.12"
dependencies = [

    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.32.0",

    "pydantic>=2.9.0",
    "pydantic-settings>=2.6.0",

    "sqlalchemy>=2.0.35",
    "alembic>=1.13.3",
    "psycopg[binary]>=3.2.3",

    "httpx>=0.27.2",
    "python-multipart>=0.0.12",

    "orjson>=3.10.7",
    "structlog>=24.4.0",
]

[project.scripts]
backend = "backend.main:run"

[tool.uv.sources]
shared = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv]
package = true

[tool.hatch.build.targets.wheel]
packages = ["src/backend"]