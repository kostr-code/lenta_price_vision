[project]
name = "ml"
version = "0.1.0"
description = "ML, CV and OCR inference service for retail price tag recognition"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.32.0",

    "pydantic>=2.9.0",
    "pydantic-settings>=2.6.0",

    "python-multipart>=0.0.12",

    "pillow>=10.4.0",
    "numpy>=1.26.0",
    "opencv-python>=4.10.0",

    "torch>=2.11.0",
    "torchvision>=0.26.0",

    "ultralytics>=8.3.0",

    "orjson>=3.10.7",
    "structlog>=24.4.0",
]

[project.optional-dependencies]
ocr = [
    "albumentations>=1.4.0,<2.0.0",
    "paddleocr>=2.8.0",
    "paddlepaddle>=2.6.0",
    "pytesseract>=0.3.13",
]
qr = [
    "zxing-cpp>=2.2.0",
    "pyzbar>=0.1.9",
]
quality = [
    "albumentations>=1.4.0,<2.0.0",
    "paddleocr>=2.8.0",
    "paddlepaddle>=2.6.0",
    "pytesseract>=0.3.13",
    "zxing-cpp>=2.2.0",
    "pyzbar>=0.1.9",
]
[dependency-groups]
dev = [
    "ruff>=0.8.0",
    "pytest>=8.3.0",
    "pytest-asyncio>=0.24.0",
    "httpx>=0.27.2",
]

[project.scripts]
ml-service = "ml.main:run"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv]
package = true

[tool.uv.sources]
torch = [
    { index = "pytorch-cu128", marker = "sys_platform == 'linux' or sys_platform == 'win32'" },
]
torchvision = [
    { index = "pytorch-cu128", marker = "sys_platform == 'linux' or sys_platform == 'win32'" },
]

[[tool.uv.index]]
name = "pytorch-cu128"
url = "https://download.pytorch.org/whl/cu128"
explicit = true

[tool.hatch.build.targets.wheel]
packages = ["src/ml"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = [
    "E",
    "F",
    "I",
    "UP",
    "B",
    "SIM"
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"

[tool.pytest.ini_options]
testpaths = [
    "tests"
]
asyncio_mode = "auto"
pythonpath = [
    "src"
]
