name: price-tag-audit

services:
  postgres:
    image: postgres:16
    container_name: price-audit-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-price_audit}
      POSTGRES_USER: ${POSTGRES_USER:-price_audit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-price_audit}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-price_audit} -d ${POSTGRES_DB:-price_audit}"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    container_name: price-audit-backend
    environment:
      APP_ENV: ${APP_ENV:-dev}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-price_audit}:${POSTGRES_PASSWORD:-price_audit}@postgres:5432/${POSTGRES_DB:-price_audit}
      ML_URL: http://ml:8000
      AUTO_CREATE_TABLES: ${AUTO_CREATE_TABLES:-1}
    ports:
      - "${BACKEND_PORT:-8001}:8001"
    depends_on:
      postgres:
        condition: service_healthy
      ml:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 5s
      timeout: 3s
      retries: 20

  ml:
    build:
      context: .
      dockerfile: infra/docker/ml.Dockerfile
    container_name: price-audit-ml
    environment:
      APP_ENV: ${APP_ENV:-dev}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ML_DEVICE: ${ML_DEVICE:-cpu}
      MODEL_PATH: ${MODEL_PATH:-/app/models/price_tag_detector.pt}
      ML_ENABLE_STUB: ${ML_ENABLE_STUB:-1}
    ports:
      - "${ML_PORT:-8000}:8000"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres_data:
