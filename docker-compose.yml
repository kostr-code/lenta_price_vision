name: price-tag-audit

services:
  postgres:
    image: postgres:16
    container_name: price-audit-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-price_audit}
      POSTGRES_USER: ${POSTGRES_USER:-price_audit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-price_audit}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-price_audit} -d ${POSTGRES_DB:-price_audit}"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    container_name: price-audit-backend
    environment:
      APP_ENV: ${APP_ENV:-dev}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-price_audit}:${POSTGRES_PASSWORD:-price_audit}@postgres:5432/${POSTGRES_DB:-price_audit}
      ML_URL: ${ML_URL:-http://host.docker.internal:8000}
      AUTO_CREATE_TABLES: ${AUTO_CREATE_TABLES:-1}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${BACKEND_PORT:-8001}:8001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 5s
      timeout: 3s
      retries: 20

  frontend:
    build:
      context: .
      dockerfile: infra/docker/frontend.Dockerfile
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-http://localhost:8001}
    container_name: price-audit-frontend
    ports:
      - "${FRONTEND_PORT:-5173}:4173"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:4173 > /dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres_data:
